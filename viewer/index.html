<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SessionConflux 会话浏览器</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface-hover: #1a2744;
    --accent: #0f3460;
    --text: #e6e6e6;
    --text-dim: #8892a4;
    --workbuddy: #4fc3f7;
    --codex: #66bb6a;
    --claude: #ffa726;
    --user-bg: #1a3a5c;
    --assistant-bg: #252540;
    --border: #2a3a5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 18px; font-weight: 600; }
  .sidebar-header span { color: var(--text-dim); font-size: 12px; display: block; margin-top: 4px; }
  .tree { flex: 1; overflow-y: auto; padding: 8px 0; }
  .tree::-webkit-scrollbar { width: 6px; }
  .tree::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  .tree-item { cursor: pointer; user-select: none; }
  .tree-row { display: flex; align-items: center; padding: 6px 12px; font-size: 14px; gap: 8px; transition: background 0.15s; }
  .tree-row:hover { background: var(--surface-hover); }
  .tree-row.active { background: var(--accent); }
  .tree-arrow { width: 16px; text-align: center; color: var(--text-dim); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .tree-arrow.expanded { transform: rotate(90deg); }
  .tree-arrow.hidden { visibility: hidden; }
  .tree-icon { width: 18px; text-align: center; flex-shrink: 0; }
  .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-badge { background: var(--accent); color: var(--text-dim); font-size: 11px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }

  .tree-children { padding-left: 20px; overflow: hidden; }
  .tree-children.collapsed { display: none; }

  /* Agent colors */
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .agent-dot.workbuddy { background: var(--workbuddy); }
  .agent-dot.codex { background: var(--codex); }
  .agent-dot.claude { background: var(--claude); }

  /* Main panel */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); font-size: 14px; }
  .main-header h2 { font-size: 16px; margin-bottom: 4px; }
  .main-header .meta { color: var(--text-dim); font-size: 12px; display: flex; gap: 16px; }

  .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
  .chat-container::-webkit-scrollbar { width: 8px; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  .message { margin-bottom: 16px; display: flex; gap: 12px; }
  .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .message.user .message-avatar { background: var(--workbuddy); color: #000; }
  .message.assistant .message-avatar { background: var(--accent); color: var(--text); }

  .message-body { flex: 1; min-width: 0; }
  .message-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; display: flex; gap: 12px; }
  .message-content { padding: 12px 16px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; font-size: 14px; }
  .message.user .message-content { background: var(--user-bg); border-top-left-radius: 4px; }
  .message.assistant .message-content { background: var(--assistant-bg); border-top-left-radius: 4px; }

  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); text-align: center; }
  .welcome h3 { font-size: 24px; margin-bottom: 8px; color: var(--text); }
  .welcome p { font-size: 14px; max-width: 400px; }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--workbuddy); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    📂 SessionConflux
    <span id="status">加载中...</span>
  </div>
  <div class="tree" id="tree"></div>
</div>

<div class="main">
  <div class="main-header" id="mainHeader" style="display:none;">
    <h2 id="sessionTitle">选择会话</h2>
    <div class="meta">
      <span id="sessionAgent"></span>
      <span id="sessionComputer"></span>
      <span id="sessionCount"></span>
    </div>
  </div>
  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h3>🪶 FeatherLog</h3>
      <p>从左侧树形导航选择一台电脑 → Agent → 会话，开始浏览对话记录</p>
    </div>
  </div>
</div>

<script>
let allSessions = {};
let treeData = {};

async function fetchTree() {
  const resp = await fetch('/api/tree');
  const data = await resp.json();
  if (resp.status !== 200) throw new Error(data.error || 'Failed to fetch');
  return data;
}

async function fetchSession(agent, sessionId) {
  const resp = await fetch(`/api/session/${encodeURIComponent(agent)}/${encodeURIComponent(sessionId)}`);
  const data = await resp.json();
  if (resp.status !== 200) throw new Error(data.error || 'Failed to fetch');
  return data;
}

function renderTree(computers) {
  const treeEl = document.getElementById('tree');
  let html = '';

  for (const [computer, agents] of Object.entries(computers).sort()) {
    const totalSessions = Object.values(agents).reduce((sum, sessions) => sum + sessions.length, 0);
    html += `<div class="tree-item">
      <div class="tree-row" data-type="computer" data-computer="${computer}">
        <span class="tree-arrow">▶</span>
        <span class="tree-icon">💻</span>
        <span class="tree-label">${computer}</span>
        <span class="tree-badge">${totalSessions}</span>
      </div>
      <div class="tree-children collapsed">`;

    for (const [agent, sessions] of Object.entries(agents).sort()) {
      const dotClass = agent.toLowerCase();
      html += `<div class="tree-item">
        <div class="tree-row" data-type="agent" data-agent="${agent}" data-computer="${computer}">
          <span class="tree-arrow">▶</span>
          <span class="tree-icon"><span class="agent-dot ${dotClass}"></span></span>
          <span class="tree-label">${agent}</span>
          <span class="tree-badge">${sessions.length}</span>
        </div>
        <div class="tree-children collapsed">`;

      for (const session of sessions) {
        const sessionLabel = `💬 ${session.title}`;
        html += `<div class="tree-item">
          <div class="tree-row" data-type="session"
               data-session="${session.session_id}"
               data-agent="${agent}"
               data-computer="${computer}">
            <span class="tree-arrow hidden">▶</span>
            <span class="tree-icon"></span>
            <span class="tree-label" title="${session.session_id}">${sessionLabel}</span>
            <span class="tree-badge">${session.message_count}</span>
          </div>
        </div>`;
      }

      html += `</div></div>`;
    }

    html += `</div></div>`;
  }

  const totalSessions = Object.values(computers).reduce(
    (sum, agents) => sum + Object.values(agents).reduce((s, sessions) => s + sessions.length, 0), 0);
  document.getElementById('status').textContent = `${totalSessions} 个会话`;

  treeEl.innerHTML = html;

  // Add click handlers
  treeEl.querySelectorAll('.tree-row').forEach(row => {
    row.addEventListener('click', () => {
      const type = row.dataset.type;
      const children = row.parentElement.querySelector('.tree-children');
      const arrow = row.querySelector('.tree-arrow');

      if (type === 'computer' || type === 'agent') {
        if (children) {
          children.classList.toggle('collapsed');
          arrow.classList.toggle('expanded');
        }
      } else if (type === 'session') {
        treeEl.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        showSession(row.dataset.session, row.dataset.agent, row.dataset.computer);
      }
    });
  });
}

async function showSession(sessionId, agent, computer) {
  const chatContainer = document.getElementById('chatContainer');
  chatContainer.innerHTML = '<div class="loading"><div class="spinner"></div>加载会话中...</div>';

  try {
    const data = await fetchSession(agent, sessionId);
    const sessionMessages = data.messages || [];
    const mainHeader = document.getElementById('mainHeader');
    mainHeader.style.display = 'block';

    document.getElementById('sessionTitle').textContent =
      agent === 'workbuddy' ? '' : `会话 ${sessionId.substring(0, 8)}...`;
    document.getElementById('sessionAgent').textContent = `Agent: ${agent}`;
    document.getElementById('sessionComputer').textContent = `电脑: ${computer}`;
    document.getElementById('sessionCount').textContent = `消息: ${sessionMessages.length} 条`;

    let chatHtml = '';

    sessionMessages.forEach(msg => {
      const role = msg.role || 'assistant';
      const avatar = role === 'user' ? '👤' : '🤖';
      const content = escapeHtml(msg.content || '');
      const time = msg.timestamp ? formatTime(msg.timestamp) : '';

      chatHtml += `<div class="message ${role}">
        <div class="message-avatar">${avatar}</div>
        <div class="message-body">
          <div class="message-meta">
            <span>${time}</span>
            <span>#${msg.index}</span>
          </div>
          <div class="message-content">${content}</div>
        </div>
      </div>`;
    });

    chatContainer.innerHTML = chatHtml;
  } catch (e) {
    chatContainer.innerHTML = `<div style="padding:20px;color:#f44;">加载失败: ${e.message}</div>`;
  }
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleString('zh-CN', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch {
    return ts;
  }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

async function init() {
  try {
    treeData = await fetchTree();
    renderTree(treeData);
  } catch (e) {
    document.getElementById('tree').innerHTML =
      `<div style="padding:16px;color:#f44;">加载失败: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
