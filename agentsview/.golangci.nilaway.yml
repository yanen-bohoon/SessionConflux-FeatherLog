version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - nilaway
  settings:
    custom:
      nilaway:
        type: "module"
        description: Static analysis tool to detect potential nil panics in Go code.
        settings:
          include-pkgs: "github.com/wesm/agentsview"
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - nilaway
